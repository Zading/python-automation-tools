{% extends "base.html" %}

{% block title %}Registro - Gestor de Tareas{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2>📝 Crear Cuenta</h2>
            <p>Regístrate para comenzar a gestionar tus tareas</p>
        </div>

        <form method="POST" action="{{ url_for('registro') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Nombre de Usuario *</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Elige un nombre de usuario"
                    required
                    autofocus
                    autocomplete="username"
                    minlength="3"
                >
                <small class="form-help">Mínimo 3 caracteres</small>
            </div>

            <div class="form-group">
                <label for="email">Email (Opcional)</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="tu@email.com"
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña *</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Crea una contraseña segura"
                    required
                    autocomplete="new-password"
                    minlength="4"
                >
                <small class="form-help">Mínimo 4 caracteres</small>
            </div>

            <div class="form-group">
                <label for="confirmar_password">Confirmar Contraseña *</label>
                <input 
                    type="password" 
                    id="confirmar_password" 
                    name="confirmar_password" 
                    placeholder="Confirma tu contraseña"
                    required
                    autocomplete="new-password"
                    minlength="4"
                >
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block">Crear Cuenta</button>
            </div>
        </form>

        <div class="auth-footer">
            <p>¿Ya tienes una cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}
